<!-- LANGUAGE SCRIPT (UNCHANGED FROM ALFULKA) -->
<script>
  const toggle = document.getElementById('lang-toggle');
  let currentLang = 'en';

  function updateLanguage(lang) {
    document.documentElement.lang = lang;
    document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';

    document.querySelector('.lang-en').classList.toggle('font-semibold', lang === 'en');
    document.querySelector('.lang-en').classList.toggle('text-gray-500', lang !== 'en');
    document.querySelector('.lang-ar').classList.toggle('font-semibold', lang === 'ar');
    document.querySelector('.lang-ar').classList.toggle('text-gray-500', lang !== 'ar');

    document.querySelectorAll('[data-en]').forEach(el => {
      const text = el.getAttribute(`data-${lang}`);
      if (text !== null) el.textContent = text;
    });
  }

  toggle.addEventListener('click', () => {
    currentLang = currentLang === 'en' ? 'ar' : 'en';
    updateLanguage(currentLang);
  });

  updateLanguage(currentLang);
</script>
